<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Set new password · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-brand">
    <div>
      <span class="badge"><i data-lucide="shield-check" style="width:14px;height:14px;margin-right:6px;vertical-align:-2px"></i>Security</span>
      <h1>One last step.</h1>
      <p>Pick a strong password to replace the temporary one we emailed you. You'll use this every time you sign in.</p>
    </div>
    <div style="opacity:.8;font-size:13px">© 2026 EcoCycle.</div>
  </div>
  <div class="auth-form-wrap">
    <form class="auth-card animate-in" onsubmit="return doChange(event)">
      <h2>Set a new password</h2>
      <p class="sub" id="who">Securely update your account.</p>
      <div class="field"><label>Current (temporary) password</label><input class="input" type="password" id="curr" required autocomplete="current-password"/></div>
      <div class="field"><label>New password</label><input class="input" type="password" id="np1" required minlength="8" autocomplete="new-password"/></div>
      <div class="field"><label>Confirm new password</label><input class="input" type="password" id="np2" required minlength="8" autocomplete="new-password"/></div>
      <button class="btn btn-primary btn-block" type="submit"><i data-lucide="lock"></i>Update password</button>
    </form>
  </div>
</div>
<script src="../assets/js/app.js"></script>
<script>
  if(!Auth.user || !Auth.token){ location.href = "LoginPage.html"; throw new Error("auth required"); }
  document.getElementById('who').textContent = "Signed in as " + (Auth.user.email || "");
  async function doChange(e){
    e.preventDefault();
    const cur = document.getElementById('curr').value;
    const a = document.getElementById('np1').value;
    const b = document.getElementById('np2').value;
    if (a !== b) { toast("New passwords don't match", 'error'); return false; }
    if (a.length < 8) { toast("Password must be at least 8 characters", 'error'); return false; }
    try {
      await api('/auth/change-password', { method: 'POST', body: { current_password: cur, new_password: a } });
      toast("Password updated. Redirecting...");
      Auth.user = { ...Auth.user, must_change_password: false };
      const role = Auth.user.role;
      setTimeout(()=>{
        if (role === 'admin') location.href = '../AdminScreens/AdminDashboardHub.html';
        else if (role === 'superadmin') location.href = '../SuperAdminScreens/SuperAdminExecutiveHub.html';
        else location.href = '../UserScreens/Dashboard.html';
      }, 800);
    } catch (err) {
      toast(err.message || 'Could not change password', 'error');
    }
    return false;
  }
</script>
</body>
</html>
