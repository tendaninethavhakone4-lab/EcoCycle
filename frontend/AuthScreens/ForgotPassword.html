<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset Password · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-brand">
    <div>
      <span class="badge"><i data-lucide="key-round" style="width:14px;height:14px;margin-right:6px;vertical-align:-2px"></i>Account Recovery</span>
      <h1>EcoCycle.</h1>
      <p>Don't worry — we'll get you back in. Enter your email and we'll send a secure reset link within seconds.</p>
    </div>
    <div style="opacity:.8;font-size:13px">© 2026 EcoCycle — Building a circular economy.</div>
  </div>
  <div class="auth-form-wrap">
    
<form class="auth-card animate-in" onsubmit="return doReset(event)">
  <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#ECFDF5,#A7F3D0);display:flex;align-items:center;justify-content:center;margin-bottom:20px;color:var(--primary)">
    <i data-lucide="key-round" style="width:28px;height:28px"></i>
  </div>
  <h2>Forgot password?</h2>
  <p class="sub">No problem. We'll email you a one-time reset link.</p>
  <div class="field"><label>Registered email</label><input class="input" type="email" id="email" placeholder="you@company.com" required/></div>
  <button class="btn btn-primary btn-block" type="submit"><i data-lucide="send"></i>Send reset link</button>
  <div class="center mt-3"><a href="LoginPage.html" style="color:var(--primary);font-weight:700">← Back to sign in</a></div>
</form>
<script>
async function doReset(e){ e.preventDefault();
  const em = document.getElementById('email').value;
  try { await api("/auth/forgot-password",{method:"POST",body:{email:em}}); } catch{}
  toast("If " + em + " is registered, a reset link is on the way.");
  setTimeout(()=>location.href="LoginPage.html",1500); return false;
}
</script>

  </div>
</div>
<script src="../assets/js/app.js"></script>
</body>
</html>
