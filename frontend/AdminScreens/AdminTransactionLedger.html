<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Transaction Ledger · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />

</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar"></header>
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">Transaction Ledger</div>
        <div class="page-sub">Full reconciliation view · live data</div>
      </div>
      <div class="row" style="gap:8px">
        <button class="btn btn-secondary" id="btnCsv"><i data-lucide="file-down"></i> Export CSV</button>
        <button class="btn btn-primary" id="btnInvoice"><i data-lucide="file-text"></i> Generate Invoice</button>
      </div>
    </div>

    <div class="section">
      <div class="row mb-3" style="gap:8px;flex-wrap:wrap">
        <input id="q" class="input" placeholder="Search picker, material, ID…" style="max-width:280px"/>
        <input id="from" class="input" type="date" style="max-width:160px"/>
        <input id="to" class="input" type="date" style="max-width:160px"/>
        <select id="status" class="input" style="max-width:160px">
          <option value="">All statuses</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selAll"/></th>
              <th>ID</th><th>Date</th><th>Picker</th><th>Branch</th>
              <th>Material</th><th>Weight</th><th class="r">Amount</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <div id="docMount" style="display:none;margin-top:24px"></div>

<script>
let ALL = [];
async function load() {
  try {
    const res = await api("/transactions");
    ALL = (res.transactions || res || []).map(t => ({
      id: t.id || t.tx_id,
      date: (t.created_at || t.date || "").slice(0, 10),
      picker: t.picker_name || t.picker || "—",
      branch: t.branch || "—",
      material: t.material,
      weight_kg: Number(t.weight_kg || t.weight || 0),
      amount: Number(t.amount || 0),
      status: t.status || "completed",
    }));
  } catch (e) {
    console.warn("falling back to mock", e.message);
    ALL = Array.from({ length: 40 }, (_, i) => ({
      id: `TX-${1043 - i}`, date: `2026-04-${28 - i % 9}`,
      picker: "Joseph A.", branch: "Lagos Central",
      material: ["Plastic","Paper","Metal","Glass"][i % 4],
      weight_kg: 10 + i % 30, amount: 5 + i % 20,
      status: ["completed","completed","pending","completed"][i % 4],
    }));
  }
  render();
}
function filtered() {
  const q = document.getElementById("q").value.toLowerCase();
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const st = document.getElementById("status").value;
  return ALL.filter(t =>
    (!q || (t.id + t.picker + t.material).toLowerCase().includes(q)) &&
    (!from || t.date >= from) && (!to || t.date <= to) &&
    (!st || t.status === st)
  );
}
function render() {
  const rows = filtered();
  document.getElementById("rows").innerHTML = rows.map(t => `
    <tr>
      <td><input type="checkbox" class="rowchk" data-id="${t.id}"/></td>
      <td><strong>${t.id}</strong></td>
      <td>${t.date}</td>
      <td>${t.picker}</td>
      <td>${t.branch}</td>
      <td>${t.material}</td>
      <td>${t.weight_kg} kg</td>
      <td class="r"><strong>R ${t.amount.toFixed(2)}</strong></td>
      <td><span class="status ${t.status}">${t.status}</span></td>
      <td><button class="btn btn-ghost btn-sm" data-receipt="${t.id}"><i data-lucide="receipt"></i></button></td>
    </tr>`).join("");
  if (window.lucide) window.lucide.createIcons();
}
function selected() {
  const ids = [...document.querySelectorAll(".rowchk:checked")].map(c => c.dataset.id);
  return ids.length ? ALL.filter(t => ids.includes(t.id)) : filtered();
}
async function exportCsv() {
  await window.EcoCycle.ready;
  EcoCycle.CSV.download(selected(), `transactions-${new Date().toISOString().slice(0,10)}.csv`);
  toast("CSV exported");
}
async function generateInvoice() {
  await window.EcoCycle.ready;
  const rows = selected();
  if (!rows.length) return toast("No rows to invoice", "warn");
  const items = rows.map(t => ({
    name: `${t.material} pickup · ${t.id}`,
    note: `${t.picker} · ${t.date}`,
    qty: t.weight_kg, unit: "kg",
    price: t.amount / Math.max(t.weight_kg, 1),
  }));
  const opts = {
    id: "INV-" + Date.now().toString(36).toUpperCase().slice(-6),
    date: new Date(), dueDate: new Date(Date.now() + 14 * 86400000),
    from: { name: "EcoCycle Inc.", address: "12 Greenway Plaza, Lagos, NG", email: "billing@ecocycle.app" },
    to:   { name: rows[0].branch + " Branch", address: "Internal recipient", email: "ops@ecocycle.app" },
    status: "due", method: "Bank Transfer", ref: "EC-" + rows[0].id,
    taxRate: 0.075,
    items,
  };
  const mount = document.getElementById("docMount");
  mount.style.display = "block";
  mount.innerHTML = `
    <div class="doc-actions">
      <button class="btn btn-primary" id="dlInv"><i data-lucide="download"></i> Download PDF</button>
      <button class="btn btn-secondary" id="prInv"><i data-lucide="printer"></i> Print</button>
      <button class="btn btn-ghost" id="closeInv"><i data-lucide="x"></i> Close</button>
    </div>
    <div id="invSlot"></div>`;
  EcoCycle.Invoice.render("#invSlot", opts);
  document.getElementById("dlInv").onclick = () => EcoCycle.Invoice.download(opts);
  document.getElementById("prInv").onclick = () => EcoCycle.Invoice.print(opts);
  document.getElementById("closeInv").onclick = () => { mount.style.display = "none"; mount.innerHTML = ""; };
  if (window.lucide) window.lucide.createIcons();
  mount.scrollIntoView({ behavior: "smooth" });
}
async function showReceipt(id) {
  await window.EcoCycle.ready;
  const t = ALL.find(x => x.id === id);
  if (!t) return;
  const opts = {
    id: t.id, date: t.date, picker: t.picker, branch: t.branch, method: "EcoCycle Wallet",
    items: [{ name: t.material, qty: t.weight_kg, unit: "kg", price: t.amount / Math.max(t.weight_kg, 1) }],
    qr: `https://ecocycle.app/r/${t.id}`,
  };
  const mount = document.getElementById("docMount");
  mount.style.display = "block";
  mount.innerHTML = `
    <div class="doc-actions">
      <button class="btn btn-primary" id="dlRcp"><i data-lucide="download"></i> Download PDF</button>
      <button class="btn btn-secondary" id="prRcp"><i data-lucide="printer"></i> Print</button>
      <button class="btn btn-ghost" id="closeRcp"><i data-lucide="x"></i> Close</button>
    </div>
    <div id="rcpSlot" style="display:flex;justify-content:center"></div>`;
  EcoCycle.Receipt.render("#rcpSlot", opts);
  document.getElementById("dlRcp").onclick = () => EcoCycle.Receipt.download(opts);
  document.getElementById("prRcp").onclick = () => EcoCycle.Receipt.print(opts);
  document.getElementById("closeRcp").onclick = () => { mount.style.display = "none"; mount.innerHTML = ""; };
  if (window.lucide) window.lucide.createIcons();
  mount.scrollIntoView({ behavior: "smooth" });
}

document.addEventListener("input", e => { if (["q","from","to","status"].includes(e.target.id)) render(); });
document.addEventListener("change", e => {
  if (e.target.id === "selAll") document.querySelectorAll(".rowchk").forEach(c => c.checked = e.target.checked);
});
document.addEventListener("click", e => {
  if (e.target.closest("#btnCsv")) exportCsv();
  else if (e.target.closest("#btnInvoice")) generateInvoice();
  else if (e.target.closest("[data-receipt]")) showReceipt(e.target.closest("[data-receipt]").dataset.receipt);
});
load();
</script>

  </main>
</div>
<script src="../assets/js/app.js"></script>
<script>
  if(!Auth.user){ location.href = "../AuthScreens/LoginPage.html"; throw new Error("auth required"); }
  Auth.requireRole(["admin"]);
  renderShell("admin");
</script>
</body>
</html>
