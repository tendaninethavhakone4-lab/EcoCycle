<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI Insights · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />

</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar"></header>
  <main class="main">

    <div class="page-header"><div><div class="page-title">AI Insights Hub</div><div class="page-sub">Strategic intelligence & live forecasts</div></div></div>
    <div class="section"><div class="section-title">Forecast (next 7 days, kg)</div><canvas id="aiFc" height="260"></canvas></div>
    <div class="section"><div class="section-title">Recommendations</div><ul data-live-list="insights" style="list-style:none;display:flex;flex-direction:column;gap:10px"></ul></div>

  </main>
</div>
<script src="../assets/js/app.js"></script>
<script>
  if(!Auth.user){ location.href = "../AuthScreens/LoginPage.html"; throw new Error("auth required"); }
  Auth.requireRole(["superadmin"]);
  renderShell("superadmin");
  (async () => { await EcoCycle.ready;
    try { const { forecast = [] } = await api("/insights");
      EcoCycle.Charts.area("aiFc", forecast.map(f=>f.label||f.day||""), forecast.map(f=>Number(f.value||f.kg||0)), "Forecast kg");
    } catch(e){ console.warn(e); }
  })();
</script>
</body>
</html>
