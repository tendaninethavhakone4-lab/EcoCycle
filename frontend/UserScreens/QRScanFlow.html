<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR Scan · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />

</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar"></header>
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">QR Scan</div>
        <div class="page-sub">Point your camera at a picker's QR badge — auto-recognises in real time</div>
      </div>
      <div class="row" style="gap:8px">
        <button class="btn btn-secondary btn-sm" id="btnFlip"><i data-lucide="repeat"></i> Flip Camera</button>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card" style="padding:0;overflow:hidden;background:linear-gradient(135deg,#0f172a,#064E3B)">
        <div id="qrViewport" class="qr-viewport">
          <div class="qr-overlay">
            <span></span><span></span><span></span><span></span>
            <div class="qr-laser"></div>
          </div>
          <div class="qr-status" id="qrStatus">Initialising camera…</div>
        </div>
        <div class="row" style="justify-content:center;gap:10px;padding:16px;background:#0b1220">
          <button class="btn btn-secondary btn-sm" id="btnStop"><i data-lucide="square"></i> Stop</button>
          <button class="btn btn-primary btn-sm" id="btnSim"><i data-lucide="zap"></i> Simulate Scan</button>
        </div>
      </div>

      <div class="card">
        <div class="row" style="justify-content:space-between;margin-bottom:12px">
          <h3 style="margin:0">Manual ID Entry</h3>
          <span class="chip chip-primary"><i data-lucide="keyboard"></i> Backup</span>
        </div>
        <div class="field"><label>Picker ID</label><input class="input" id="manualId" placeholder="PK-001"/></div>
        <button class="btn btn-primary btn-block" id="btnContinue"><i data-lucide="arrow-right"></i> Continue</button>

        <div class="mt-4">
          <div class="muted" style="font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase">Recently scanned</div>
          <div id="recentList" style="display:flex;flex-direction:column;gap:8px;margin-top:10px"></div>
        </div>

        <div class="mt-4" style="padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,78,59,0.04));border:1px solid rgba(16,185,129,0.18)">
          <div style="display:flex;align-items:center;gap:8px;font-weight:800;color:var(--secondary);font-size:13px"><i data-lucide="shield-check" style="width:16px;height:16px"></i> Secure scan</div>
          <p style="margin:6px 0 0;font-size:12px;color:#475569;line-height:1.5">All scans are signed locally and verified server-side before a transaction is opened.</p>
        </div>
      </div>
    </div>

<script>
const RECENT_KEY = "ec_recent_scans";
function getRecent() { try { return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch { return []; } }
function pushRecent(id, name) {
  const list = [{ id, name: name || "—", at: Date.now() }, ...getRecent().filter(x => x.id !== id)].slice(0, 6);
  localStorage.setItem(RECENT_KEY, JSON.stringify(list));
  renderRecent();
}
function renderRecent() {
  const list = getRecent();
  const fallback = list.length ? list : [
    { id: "PK-001", name: "Joseph A.", at: Date.now() - 1e6 },
    { id: "PK-004", name: "Adaeze",    at: Date.now() - 5e6 },
  ];
  document.getElementById("recentList").innerHTML = fallback.map(r => `
    <a href="TransactionFlow(Wizard).html?picker=${r.id}" class="action-tile" style="padding:12px">
      <div class="icon" style="width:36px;height:36px"><i data-lucide="user"></i></div>
      <div><h4 style="margin:0;font-size:13px">${r.id}</h4><p style="margin:0;font-size:11px">${r.name}</p></div>
    </a>`).join("");
  if (window.lucide) window.lucide.createIcons();
}

let qr = null, currentCamId = null, cams = [], camIdx = 0;

async function startScanner() {
  await window.EcoCycle.ready;
  await window.EcoCycle.loadQrScanner();
  const status = document.getElementById("qrStatus");
  try {
    cams = await Html5Qrcode.getCameras();
    if (!cams.length) throw new Error("No cameras");
    qr = new Html5Qrcode("qrViewport", { verbose: false });
    currentCamId = cams[camIdx % cams.length].id;
    await qr.start(currentCamId,
      { fps: 12, qrbox: { width: 240, height: 240 }, aspectRatio: 1 },
      onScan,
      () => {}
    );
    status.style.display = "none";
  } catch (e) {
    status.innerHTML = `<i data-lucide="camera-off"></i> Camera unavailable. Use the manual ID entry on the right.`;
    if (window.lucide) window.lucide.createIcons();
  }
}
function onScan(text) {
  const id = (text || "").trim();
  if (!id) return;
  toast("Scanned " + id);
  pushRecent(id);
  stopScanner().finally(() => {
    location.href = "TransactionFlow(Wizard).html?picker=" + encodeURIComponent(id);
  });
}
async function stopScanner() {
  if (qr) { try { await qr.stop(); await qr.clear(); } catch {} qr = null; }
}
document.addEventListener("click", async e => {
  if (e.target.closest("#btnFlip")) {
    if (cams.length < 2) return toast("Only one camera detected", "warn");
    await stopScanner(); camIdx++; startScanner();
  }
  if (e.target.closest("#btnStop")) { await stopScanner(); document.getElementById("qrStatus").textContent = "Scanner stopped"; document.getElementById("qrStatus").style.display = "block"; }
  if (e.target.closest("#btnSim")) onScan("PK-001");
  if (e.target.closest("#btnContinue")) {
    const v = manualId.value.trim();
    if (v) { pushRecent(v); location.href = "TransactionFlow(Wizard).html?picker=" + encodeURIComponent(v); }
  }
});
window.addEventListener("beforeunload", stopScanner);
renderRecent();
startScanner();
</script>

<style>
.qr-viewport { position:relative; width:100%; aspect-ratio:1/1; background:#000; display:flex; align-items:center; justify-content:center; }
.qr-viewport video, .qr-viewport canvas { width:100% !important; height:100% !important; object-fit:cover; }
.qr-overlay { position:absolute; inset:0; pointer-events:none; }
.qr-overlay > span { position:absolute; width:48px; height:48px; border:3px solid #10B981; border-radius:6px; }
.qr-overlay > span:nth-child(1) { top:18%; left:18%; border-right:0; border-bottom:0; }
.qr-overlay > span:nth-child(2) { top:18%; right:18%; border-left:0; border-bottom:0; }
.qr-overlay > span:nth-child(3) { bottom:18%; left:18%; border-right:0; border-top:0; }
.qr-overlay > span:nth-child(4) { bottom:18%; right:18%; border-left:0; border-top:0; }
.qr-laser { position:absolute; left:18%; right:18%; top:18%; height:3px; background:linear-gradient(90deg, transparent, #10B981, transparent); box-shadow:0 0 16px #10B981; animation:qrLaser 2.4s ease-in-out infinite; border-radius:3px; }
@keyframes qrLaser { 0%,100% { transform:translateY(0); } 50% { transform:translateY(64vmin); } }
.qr-status { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); color:#ECFDF5; font-weight:700; font-size:13px; background:rgba(2,6,23,0.6); padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px); }
</style>

  </main>
</div>
<script src="../assets/js/app.js"></script>
<script>
  if(!Auth.user){ location.href = "../AuthScreens/LoginPage.html"; throw new Error("auth required"); }
  Auth.requireRole(["user"]);
  renderShell("user");
</script>
</body>
</html>
