<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Marketplace · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="../assets/css/styles.css" />

</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar"></header>
  <main class="main">

    <div class="page-header"><div><div class="page-title">Marketplace & Sales</div><div class="page-sub">Live inventory · live prices · live sales</div></div><button class="btn btn-primary" id="btnNewSale">+ Record Sale</button></div>

    <div class="section">
      <div class="section-title">Inventory & Live Prices (R/kg)</div>
      <div class="grid grid-3" id="invCards"><p class="muted">Loading…</p></div>
    </div>

    <div class="section">
      <div class="section-title">Recent Sales</div>
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Buyer</th><th>Material</th><th>Qty</th><th>Total</th><th>Status</th></tr></thead>
        <tbody data-live-table="sales"></tbody>
      </table></div>
    </div>

    <div class="modal-backdrop" id="newListing">
      <div class="modal">
        <h3>Record Sale</h3>
        <div class="field"><label>Buyer</label><input class="input" id="slBuyer"/></div>
        <div class="field"><label>Material</label><input class="input" id="slMat"/></div>
        <div class="field"><label>Quantity (kg)</label><input class="input" type="number" id="slQty"/></div>
        <div class="field"><label>Total (R)</label><input class="input" type="number" step="0.01" id="slTotal"/></div>
        <div class="modal-actions"><button class="btn btn-secondary" data-modal-close="newListing">Cancel</button><button class="btn btn-primary" id="slSave">Save</button></div>
      </div>
    </div>

  </main>
</div>
<script src="../assets/js/app.js"></script>
<script>
  if(!Auth.user){ location.href = "../AuthScreens/LoginPage.html"; throw new Error("auth required"); }
  Auth.requireRole(["user","admin","superadmin"]);
  renderShell("user");
  document.getElementById("btnNewSale").onclick = () => document.getElementById("newListing").classList.add("open");
  (async () => {
    const [{ list: inv = [] }, { list: prices = [] }] = await Promise.all([api("/inventory"), api("/prices")]);
    const byMat = Object.fromEntries(prices.map(p => [p.material, p.price_per_kg]));
    const wrap = document.getElementById("invCards");
    wrap.innerHTML = inv.length ? inv.map(i => `
      <div class="card"><h3>${i.material}</h3>
        <div class="value">${(i.stock_kg||0).toLocaleString()} kg</div>
        <div class="muted">R ${Number(byMat[i.material]||0).toFixed(2)}/kg</div>
      </div>
    `).join("") : '<p class="muted">No inventory yet — log transactions to grow stock.</p>';
  })().catch(console.warn);
  document.getElementById("slSave").onclick = async () => {
    const body = {
      buyer: document.getElementById("slBuyer").value.trim(),
      material: document.getElementById("slMat").value.trim(),
      qty: parseFloat(document.getElementById("slQty").value),
      total: parseFloat(document.getElementById("slTotal").value),
      status: "pending"
    };
    if(!body.buyer || !body.material || !body.qty || !body.total) return toast("Fill all fields","error");
    try { await api("/sales", { method:"POST", body }); toast("Sale recorded"); document.getElementById("newListing").classList.remove("open"); LiveData.refresh(); }
    catch(e){ toast(e.message,"error"); }
  };
</script>
</body>
</html>
