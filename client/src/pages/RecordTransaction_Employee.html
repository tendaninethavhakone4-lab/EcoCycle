  <main class="main">

    <h2>Record Transaction</h2>
    <p class="subtitle">Record material collection from waste pickers</p>

    <div class="card transaction-card">
        <form id="transaction-form">
            <label>Waste Picker</label>
            <div class="input-group">
                <i data-lucide="user" class="input-icon"></i>
                <select id="picker-select" required>
                    <option value="" disabled selected>Choose a waste picker</option>
                    <option value="WP-001">John Mthembu</option>
                    <option value="WP-002">Sarah Ndlovu</option>
                    <option value="WP-003">David Zuma</option>
                    <option value="WP-004">Maria Khumalo</option>
                </select>
            </div>

            <label>Material Type</label>
            <div class="input-group">
                <i data-lucide="package" class="input-icon"></i>
                <select id="material-select" required>
                    <option value="" disabled selected>Select material type</option>
                    <option value="12">Plastic (R 12/kg)</option>
                    <option value="8">Paper (R 8/kg)</option>
                    <option value="25">Metal (R 25/kg)</option>
                    <option value="6">Glass (R 6/kg)</option>
                    <option value="10">Cardboard (R 10/kg)</option>
                </select>
            </div>

            <label>Quantity (kg)</label>
            <div class="input-group">
                <i data-lucide="weight" class="input-icon"></i>
                <input type="number" id="quantity-input" placeholder="0" step="0.5" required>
            </div>

            <div class="payment-summary">
                <span>Total Payment</span>
                <strong id="total-amount">R 0.00</strong>
            </div>

            <button type="submit" class="btn-primary">Save Transaction</button>
        </form>
    </div>
  </main>
