<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOCYCLE|login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access ECOCycle</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@something.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="........" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <p class="footer-text">
            Don't have an account? <a href="create-account.html">Sign up</a>
        </p>
    </div>
    
    <script src="login.js"></script>

</body>
</html>
