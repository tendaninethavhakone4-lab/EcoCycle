<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | EcoCycle</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="auth-page">

    <!-- Brand icon -->
    <div class="brand-icon">
      <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/>
        <path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/>
        <path d="m14 16-3 3 3 3"/>
        <path d="M8.293 13.596 7.196 9.5 3.1 10.598"/>
        <path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843"/>
        <path d="m13.378 9.633 4.096 1.098 1.097-4.096"/>
      </svg>
    </div>

    <!-- Heading -->
    <div class="auth-heading">
      <h1>Create Account</h1>
      <p>Join us in making a positive impact</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <input type="text" id="fullName" placeholder="John Doe" autocomplete="name" required>
        </div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" required>
        </div>
      </div>

      <button class="btn-primary" type="button" onclick="handleSignup()">Create Account</button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>

  <script>
    function handleSignup() {
      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      if (!name || !email || !pass) { alert('Please fill in all fields.'); return; }
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
