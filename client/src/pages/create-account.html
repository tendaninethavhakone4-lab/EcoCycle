<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account|ECOCYCLE</title>
  <link rel="stylesheet" href="create-account.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Create Account</h1>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text"id="fullName" placeholder="John Doe" required>
    </div>

    <div class="form-group">
      <label>Work Email</label>
      <input type="email" id="workEmail" placeholder="john@something.com"required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password"placeholder="Your password"required>
    </div>

    <button class="create-btn">Create Account</button>

    <p class="footer-text">Already have an account? <a href="login.html">Login</a></p>
  </div>
</body>
</html>
