<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Income Board – EcoCycle</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="AdminIncomeBoard.css"/>
</head>
<body>
 
  <!-- ══ TOPBAR ══════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="1 4 1 10 7 10"/>
          <polyline points="23 20 23 14 17 14"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </div>
      <div>
        <div class="ecocycle-wordmark"><span class="eco">Eco</span>Cycle</div>
        <div class="ecocycle-sub">Informal Pickers Management</div>
      </div>
    </div>
 
    <button class="topbar-logout">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </header>
 
  <!-- ══ LAYOUT ═══════════════════════════════════════════════ -->
  <div class="layout">
 
    <!-- ── SIDEBAR ──────────────────────────────────────────── -->
    <aside class="sidebar">
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
 
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Price Management
      </a>
 
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        View Transactions
      </a>
 
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Income Board
      </a>
 
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Environmental Dashboard
      </a>
    </aside>
 
    <!-- ── MAIN CONTENT ──────────────────────────────────────── -->
    <main class="main">
 
      <h1 class="page-title">Income Board</h1>
      <p class="page-sub">Monitor all earnings and revenue streams</p>
 
      <!-- Stat cards injected by JS -->
      <div class="stats-row" id="statsRow"></div>
 
      <!-- Charts injected by JS -->
      <div class="charts-row">
        <div class="section-card">
          <div class="section-title">Revenue by Centre</div>
          <div id="centreChart"></div>
        </div>
 
        <div class="section-card">
          <div class="section-title">Revenue by Material</div>
          <div id="materialChart"></div>
        </div>
      </div>
 
    </main>
  </div>
 
  <script src="AdminIncomeBoard.js"></script>
</body>
</html>
