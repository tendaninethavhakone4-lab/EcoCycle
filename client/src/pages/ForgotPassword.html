<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset Password · EcoCycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="ForgotPassword.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-brand">
    <div>
      <span class="badge"><i data-lucide="key-round" style="width:14px;height:14px;margin-right:6px;vertical-align:-2px"></i>Account Recovery</span>
      <h1>EcoCycle.</h1>
      <p>Don't worry — we'll get you back in. Enter your email and we'll send a secure reset link within seconds.</p>
    </div>
    <div style="opacity:.8;font-size:13px">© 2026 EcoCycle — Building a circular economy.</div>
  </div>
  <div class="auth-form-wrap">
    
<form class="auth-card animate-in" onsubmit="return doReset(event)">
  <div class="brand-icon auth-logo">
    <svg width="28" height="28" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/><path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/><path d="m14 16-3 3 3 3"/><path d="M8.293 13.596 7.196 9.5 3.1 10.598"/><path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843"/><path d="m13.378 9.633 4.096 1.098 1.097-4.096"/></svg>
  </div>
  <h2>Forgot password?</h2>
  <p class="sub">No problem. We'll email you a one-time reset link.</p>
  <div class="field"><label>Registered email</label><input class="input" type="email" id="email" placeholder="you@company.com" required/></div>
  <button class="btn btn-primary btn-block" type="submit"><i data-lucide="send"></i>Send reset link</button>
  <div class="center mt-3"><a href="login.html" style="color:var(--primary);font-weight:700">← Back to sign in</a></div>
</form>
  </div>
</div>
<script src="ForgotPassword.js"></script>
</body>
</html>
