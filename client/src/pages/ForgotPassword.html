<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | EcoCycle</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="auth-page">

    <!-- Brand icon -->
    <div class="brand-icon">
      <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/>
        <path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/>
        <path d="m14 16-3 3 3 3"/>
        <path d="M8.293 13.596 7.196 9.5 3.1 10.598"/>
        <path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843"/>
        <path d="m13.378 9.633 4.096 1.098 1.097-4.096"/>
      </svg>
    </div>

    <!-- Heading -->
    <div class="auth-heading">
      <h1>Forgot Password?</h1>
      <p>We'll send you a link to reset it</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <button class="btn-primary" type="button" onclick="handleReset()">
        <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send Reset Link
      </button>
    </div>

    <div class="auth-footer">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>

  <script>
    function handleReset() {
      const email = document.getElementById('email').value;
      if (!email) { alert('Please enter your email address.'); return; }
      alert('Reset link sent! Check your inbox.');
    }
  </script>
</body>
</html>
